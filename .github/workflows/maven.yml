name: Java CI with Maven

# Chạy tự động mỗi khi có người push hoặc tạo Pull Request vào nhánh main
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Tải mã nguồn về máy ảo
        uses: actions/checkout@v3

      - name: Thiết lập môi trường Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # test phần Server (nơi P4 viết logic)
      - name: Chạy Unit Test cho Server
        run: |
          cd auction-server
          mvn clean test

      # (Tùy chọn) Build cả Client để chắc chắn P3 không làm lỗi giao diện
      - name: Build Client (Kiểm tra lỗi cú pháp)
        run: |
          cd auction-client
          mvn clean compile